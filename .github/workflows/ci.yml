name: CI - Multi Branch Deploy

on:
  push:
    branches:
      - master
      - about

env:
  TZ: Asia/Shanghai

jobs:
  # ========== 主站构建部署 ==========
  build-main:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Use Node.js 🧱
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies 📦
        run: npm install

      - name: Build project 🏗️
        run: npm run build

      - name: Check dist folder (for debug) 🔍
        run: ls -la docs/.vuepress/dist

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: docs/.vuepress/dist
          destination_dir: /  # 部署到根路径

  # ========== 关于页面构建部署 ==========
  build-about:
    if: github.ref == 'refs/heads/about'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          ref: about

      - name: Use Node.js 🧱
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies 📦
        run: npm install

      - name: Build project 🏗️
        run: npm run build

      - name: Check dist folder (for debug) 🔍
        run: ls -la docs/.vuepress/dist

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: docs/.vuepress/dist
          destination_dir: /about  # 部署到子路径
